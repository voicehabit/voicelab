
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>들은 내용을 탭하세요</title>

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #fff;
    color: #4c4c4c;
}

.app {
    max-width: 420px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    height: 100vh;
    padding: 0 15px;
    box-sizing: border-box;
}

/* Header */
.exercise-header {
    padding: 15px 0;
    display: flex;
    align-items: center;
    gap: 15px;
}

.close-btn {
    font-size: 24px;
    color: #ccc;
    cursor: pointer;
    font-weight: bold;
}

.progress-bar-container {
    flex-grow: 1;
    height: 16px;
    background: #eee;
    border-radius: 8px;
    overflow: hidden;
}

.progress-bar {
    width: 60%; /* Example progress */
    height: 100%;
    background: linear-gradient(90deg, #ffc800, #ff9800);
    border-radius: 8px;
}

.status-icons {
    display: flex;
    align-items: center;
    gap: 5px;
    color: #1f3f9c;
    font-weight: bold;
}

/* Title */
.exercise-title {
    font-size: 24px;
    font-weight: bold;
    margin: 20px 0;
}

/* Main Content */
.main-content {
    flex-grow: 1;
}

.prompt-area {
    display: flex;
    align-items: center;
    margin-bottom: 30px;
}

.mascot {
    width: 100px;
    margin-right: 15px;
}

.speech-bubble {
    display: flex;
    border: 2px solid #eee;
    border-radius: 12px;
    padding: 5px;
}

.sound-btn {
    font-size: 30px;
    padding: 10px 15px;
    cursor: pointer;
    color: #1a8a7e;
}

.sound-btn.slow {
    border-left: 2px solid #eee;
}

.answer-area {
    border-bottom: 2px solid #eee;
    min-height: 50px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding-bottom: 10px;
    margin-bottom: 30px;
}

.word-bank {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
}

.word-btn {
    background: white;
    border: 2px solid #eee;
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 2px 0 #ddd;
    transition: all 0.2s;
    color: #4c4c4c;
    font-weight: 500;
}

.word-btn:hover {
    background-color: #f7f7f7;
}

.word-btn.selected {
    visibility: hidden; /* Hide the button in the bank when selected */
}

/* Footer */
.footer {
    padding: 20px 0;
    text-align: center;
}

.skip-link {
    color: #ccc;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    margin-bottom: 15px;
}

.confirm-btn {
    width: 100%;
    background: #e5e5e5;
    color: #bcbcbc;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    cursor: not-allowed;
    box-shadow: 0 4px 0 #cccccc;
}

</style>
</head>
<body>

<div class="app">
    <div class="exercise-header">
        <span class="close-btn">✕</span>
        <div class="progress-bar-container">
            <div class="progress-bar"></div>
        </div>
        <div class="status-icons">⚡️ ∞</div>
    </div>

    <h1 class="exercise-title">들은 내용을 탭하세요</h1>

    <div class="main-content">
        <div class="prompt-area">
            <img src="/img/mascot.png" alt="Mascot" class="mascot"/>
            <div class="speech-bubble">
                <span class="sound-btn">🔊</span>
                <span class="sound-btn slow">🐢</span>
            </div>
        </div>

        <div class="answer-area" id="answer-area"></div>

        <div class="word-bank" id="word-bank">
            <!-- Word buttons will be inserted here by JavaScript -->
        </div>
    </div>

    <div class="footer">
        <button class="skip-link">지금 들을 수 없어요</button>
        <button class="confirm-btn" id="confirm-btn" disabled>확인</button>
    </div>
</div>

<script>
const words = ["con", "azúcar", "favor", "helado", "hola", "pan", "por", "té", "Un"];
const wordBank = document.getElementById('word-bank');
const answerArea = document.getElementById('answer-area');

// Populate the word bank
words.forEach((word, index) => {
    const btn = document.createElement('button');
    btn.className = 'word-btn';
    btn.textContent = word;
    btn.dataset.id = index;
    wordBank.appendChild(btn);
    
    btn.addEventListener('click', () => selectWord(btn));
});

function selectWord(wordBtn) {
    wordBtn.classList.add('selected'); // Hide in the bank

    const answerBtn = wordBtn.cloneNode(true);
    answerBtn.classList.remove('selected');
    answerArea.appendChild(answerBtn);

    answerBtn.addEventListener('click', () => deselectWord(answerBtn));
}

function deselectWord(answerBtn) {
    const originalWordBtn = wordBank.querySelector(`[data-id="${answerBtn.dataset.id}"]`);
    originalWordBtn.classList.remove('selected'); // Show it back in the bank
    answerArea.removeChild(answerBtn);
}

</script>

</body>
</html>
