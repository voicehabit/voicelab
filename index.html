
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">

<title>Voice Habit</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI;
background:#f2f2f2;
}

.page{
display:none;
}

.page.active{
display:block;
}

.app{
max-width:420px;
margin:auto;
background:white;
min-height:100vh;
padding-bottom:80px;
}

/* header */

.header{
background:linear-gradient(180deg,#0e7c74,#1f3f9c);
color:white;
padding:25px;
}

.header h1{
margin:0;
font-size:26px;
}

/* review card */

.review-card{
background:rgba(255,255,255,0.15);
border-radius:20px;
padding:20px;
margin-top:20px;
}

.start-btn{
margin-top:20px;
background:white;
color:#4a40e0;
border:none;
padding:14px 20px;
border-radius:14px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

/* section */

.section{
padding:20px;
text-align: center;
}

.card{
background:#f5f5f5;
border-radius:18px;
padding:20px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}


/* quest */

.quest-header{
background:#f57c00;
color:white;
padding:25px;
}

.progress{
background:#ddd;
height:16px;
border-radius:20px;
overflow:hidden;
}

.bar{
background:#ff9800;
height:16px;
width:10%;
}

/* pronunciation */

#timer {
    font-size: 3.2em;
    font-weight: bold;
    text-align: center;
    margin: 20px 0;
}

.category-buttons {
    margin-bottom: 20px;
}

.category-btn {
    background: #f5f5f5;
    border: 1px solid #ddd;
    padding: 10px 15px;
    border-radius: 15px;
    cursor: pointer;
    margin: 0 5px;
    font-size: 14px;
}

.category-btn.active {
    background: #0e7c74;
    color: white;
    border-color: #0e7c74;
}

#text-display-area {
    font-size: 1.5em;
    color: #333;
    min-height: 120px;
    padding: 20px;
    border-top: 1px solid #eee;
    border-bottom: 1px solid #eee;
    margin: 20px 0;
}

.control-buttons {
    display: flex;
    justify-content: center;
    gap: 10px;
}

.control-btn {
    background: #f5f5f5;
    border: 1px solid #ddd;
    padding: 15px 30px;
    border-radius: 15px;
    cursor: pointer;
    font-size: 18px;
}

/* navbar */

.navbar{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #eee;
display:flex;
justify-content:space-around;
padding:10px 0;
max-width:420px;
margin:auto;
}

.nav-item{
font-size:22px;
cursor:pointer;
}

/* Form Styles */
.form-group {
  margin-bottom: 15px;
}

.form-group label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
}

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

.form-group textarea {
  resize: vertical;
  min-height: 100px;
}

.submit-btn {
  background: #0e7c74;
  color: white;
  border: none;
  padding: 14px 20px;
  border-radius: 14px;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  width: 100%;
}

</style>
</head>

<body>

<!-- HOME -->

<div id="home" class="page active">

<div class="app">

<div class="header">

<h1>오늘의 복습</h1>

<div class="review-card">

<div style="font-size:22px;font-weight:bold;">
귀와 발성 연결 훈련
</div>

<div style="margin-top:10px;">
소리를 듣고 몸과 발성을 동시에 훈련합니다
</div>

<button class="start-btn" onclick="openQuest()">
시작 +20 XP
</button>

</div>

</div>


<div class="section">

<h2>훈련</h2>

<div class="card" onclick="startBodyTraining()">
<div>몸훈련</div>
<div>🏋️</div>
</div>

<div class="card" onclick="startBreathTraining()">
<div>호흡훈련</div>
<div>🌬</div>
</div>

</div>

<div class="section">
  <h2>제휴 문의</h2>
  <form action="https://formspree.io/f/xaqpoqqg" method="POST">
    <div class="form-group">
      <label for="email">이메일</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
      <label for="message">문의 내용</label>
      <textarea id="message" name="message" rows="4" required></textarea>
    </div>
    <button type="submit" class="submit-btn">보내기</button>
  </form>
</div>

</div>

</div>

<!-- BODY TRAINING -->

<div id="body" class="page">
    <div class="section">
        <h2>스쿼트를 시작해 볼까?</h2>
        <div class="category-buttons">
            <button class="category-btn active" onclick="loadCategory('좋은글', this)">좋은글</button>
            <button class="category-btn" onclick="loadCategory('단문', this)">단문</button>
            <button class="category-btn" onclick="loadCategory('성경', this)">성경</button>
            <button class="category-btn" onclick="loadCategory('내글', this)">내글</button>
        </div>
        <div id="text-display-area">“ 여기에 글이 표시된다 ”</div>
        
        <div id="timer">00:00</div>

        <div class="control-buttons">
            <button class="control-btn" id="start-btn" onclick="startTraining()">시작</button>
            <button class="control-btn" id="stop-btn" onclick="stopTraining()">정지</button>
        </div>
    </div>
</div>


<!-- BREATH -->

<div id="breath" class="page">

<div class="section">

<h2>호흡훈련</h2>

<div id="breathStep">

1. 허밍

</div>

<button onclick="nextBreath()">다음</button>

</div>

</div>

<!-- QUEST -->

<div id="quest" class="page">

<div class="quest-header">

<h1>3월 발성 퀘스트</h1>

<div class="progress">
<div class="bar" id="questBar"></div>
</div>

<div id="questScore">0 / 50</div>

</div>

<div class="section">

<div class="card" onclick="startRecording()">
음성 녹음하기
</div>

<div class="card" onclick="playRecording()">
음성 저장고
</div>

</div>

<div class="section">
    <h2>댓글</h2>
    <div id="disqus_thread"></div>
    <script>
        var disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = \'quest-page\';
        };
        (function() { // DON\'T EDIT BELOW THIS LINE
        var d = document, s = d.createElement(\'script\');
        s.src = \'https://voicehabit.disqus.com/embed.js\';
        s.setAttribute(\'data-timestamp\', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
</div>

</div>

<!-- NAV -->

<div class="navbar">

<div class="nav-item" onclick="showPage(\'home\')">🏠</div>
<div class="nav-item" onclick="openQuest()">🎒</div>
<div class="nav-item" onclick="startBodyTraining()">🏋️</div>
<div class="nav-item" onclick="startBreathTraining()">🌬</div>
<div class="nav-item">⋯</div>

</div>


<script>

let xp = localStorage.getItem("xp") || 0;
let level = localStorage.getItem("level") || 1;

function showPage(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function openQuest(){
    showPage("quest");
}

/* BODY TRAINING */

let timerInterval;
let seconds = 0;
let recognition;
let isTrainingRunning = false;

const trainingTexts = {
    '좋은글': '나는 매일 더 나은 목소리를 만든다.',
    '단문': '나의 발성은 명확하고 힘이 있다.',
    '성경': '태초에 하나님이 천지를 창조하시니라.',
    '내글': '여기에 여러분의 글을 넣어보세요.'
};

function startBodyTraining() {
    showPage("body");
    resetTraining();
    loadCategory('좋은글', document.querySelector('.category-btn'));
}

function loadCategory(category, element) {
    document.getElementById('text-display-area').textContent = `“ ${trainingTexts[category]} ”`;
    document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
    if(element) element.classList.add('active');
    resetTraining();
}

function formatTime(sec) {
    const minutes = Math.floor(sec / 60).toString().padStart(2, '0');
    const seconds = (sec % 60).toString().padStart(2, '0');
    return `${minutes}:${seconds}`;
}

function resetTraining() {
    clearInterval(timerInterval);
    seconds = 0;
    document.getElementById('timer').textContent = '00:00';
    isTrainingRunning = false;
    if (recognition) {
        recognition.stop();
    }
    document.getElementById('start-btn').disabled = false;
    document.getElementById('stop-btn').disabled = true;
}

async function startTraining() {
    try {
        await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
        console.error("Microphone permission denied:", err);
        alert("마이크 사용 권한이 필요합니다. 브라우저 설정에서 마이크를 허용해주세요.");
        return;
    }

    isTrainingRunning = true;
    document.getElementById('start-btn').disabled = true;
    document.getElementById('stop-btn').disabled = false;

    timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('timer').textContent = formatTime(seconds);
    }, 1000);

    startSpeechRecognition();
}

function stopTraining() {
    isTrainingRunning = false;
    document.getElementById('start-btn').disabled = false;
    document.getElementById('stop-btn').disabled = true;

    clearInterval(timerInterval);
    const earnedXp = Math.floor(seconds / 10);
    if (earnedXp > 0) {
        xp = parseInt(xp) + earnedXp;
        localStorage.setItem("xp", xp);
        alert(`훈련 완료! +${earnedXp}XP`);
    }
    
    if (recognition) {
        recognition.stop();
    }
}

function startSpeechRecognition() {
    window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!window.SpeechRecognition) {
        alert("죄송합니다, 당신의 브라우저는 음성 인식을 지원하지 않습니다.");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'ko-KR';

    recognition.onstart = () => {
        document.getElementById('text-display-area').textContent = "음성 인식 중...";
    };

    recognition.onerror = (event) => {
        console.error('Speech recognition error:', event.error);
        let errorMessage = "음성 인식 오류가 발생했습니다.";
        if (event.error === 'no-speech') {
            errorMessage = "음성이 감지되지 않았습니다. 마이크를 확인해주세요.";
        } else if (event.error === 'not-allowed') {
            errorMessage = "마이크 사용이 차단되었습니다. 접근 권한을 확인해주세요.";
        }
        document.getElementById('text-display-area').textContent = errorMessage;
    };
    
    recognition.onend = () => {
      if (isTrainingRunning) {
        console.log("Recognition service ended. Restarting...");
        recognition.start();
      } else {
        console.log("Recognition service stopped by user.");
      }
    };

    recognition.onresult = (event) => {
        let transcript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            transcript += event.results[i][0].transcript;
        }
        document.getElementById('text-display-area').textContent = transcript;
    };

    recognition.start();
}


/* BREATH */

let breathStep=0;
let breathList=["1. 허밍", "2. 스~~~~", "3. 하품 호흡", "4. 한숨 호흡"];

function startBreathTraining(){
    showPage("breath");
    breathStep=0;
    document.getElementById("breathStep").innerText=breathList[0];
}

function nextBreath(){
    breathStep++;
    if(breathStep>=breathList.length){
        xp = parseInt(xp) + 10;
        localStorage.setItem("xp",xp);
        alert("호흡훈련 완료 +10XP");
        showPage("quest");
        return;
    }
    document.getElementById("breathStep").innerText=breathList[breathStep];
}

/* RECORD */

let recorder;
let audioBlob;

async function startRecording(){
    try {
        let stream = await navigator.mediaDevices.getUserMedia({audio:true});
        recorder = new MediaRecorder(stream);
        recorder.start();
        recorder.ondataavailable = e => { audioBlob=e.data; };
        
        setTimeout(() => {
            recorder.stop();
            alert("녹음 완료");
        }, 3000);
    } catch (err) {
        alert("마이크 사용 권한이 필요합니다.");
    }
}

function playRecording(){
    if(!audioBlob) return alert("녹음된 파일이 없습니다.");
    let audio = new Audio(URL.createObjectURL(audioBlob));
    audio.play();
}

/* QUEST */

function updateQuest(){
    let percent = (parseInt(xp) / 50) * 100;
    document.getElementById("questBar").style.width = percent + "%";
    document.getElementById("questScore").innerText = `${parseInt(xp)} / 50`;
}

setInterval(updateQuest, 500);

</script>

</body>
</html>
