<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Habit</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI;
background:#f2f2f2;
}

.page{
display:none;
max-width:420px;
margin:auto;
min-height:100vh;
background:white;
padding:20px;
}

.active{
display:block;
}

.header{
background:#ff8c00;
color:white;
padding:20px;
border-radius:20px;
}

.button{
margin-top:20px;
background:#ff8c00;
color:white;
border:none;
padding:15px;
width:100%;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.progress{
height:15px;
background:#ddd;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.bar{
height:15px;
background:#ff8c00;
width:0%;
}

.card{
background:#f5f5f5;
padding:15px;
border-radius:15px;
margin-top:15px;
}

</style>
</head>

<body>

<!-- 홈 화면 -->

<div id="home" class="page active">

<div class="header">
<h2>오늘의 발성 훈련</h2>
XP: <span id="xp">0</span>
</div>

<div class="card">
<h3>50 XP 획득하기</h3>

<div class="progress">
<div id="xpBar" class="bar"></div>
</div>

<span id="xpText">0 / 50</span>

</div>

<button class="button" onclick="startTraining()">
훈련 시작
</button>

</div>



<!-- 훈련 페이지 -->

<div id="training" class="page">

<h2>발성 훈련</h2>

<p>
"아~~~~" 소리를 5초 동안 발성하세요
</p>

<h1 id="timer">5</h1>

<button class="button" onclick="startVoice()">
녹음 시작
</button>

</div>



<!-- 결과 페이지 -->

<div id="result" class="page">

<h2>훈련 완료</h2>

<p>
발성 점수
</p>

<h1 id="score">0</h1>

<button class="button" onclick="finishTraining()">
홈으로
</button>

</div>


<script>

let xp = localStorage.getItem("xp") || 0
xp = parseInt(xp)

updateXP()

function showPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

function startTraining(){

showPage("training")

}

function startVoice(){

let time = 5

let interval = setInterval(()=>{

time--
document.getElementById("timer").innerText = time

if(time==0){

clearInterval(interval)

let score = Math.floor(Math.random()*40)+60

document.getElementById("score").innerText = score

showPage("result")

}

},1000)

}

function finishTraining(){

xp += 10

localStorage.setItem("xp",xp)

updateXP()

showPage("home")

}

function updateXP(){

document.getElementById("xp").innerText = xp

let percent = (xp % 50)/50*100

document.getElementById("xpBar").style.width = percent+"%"

document.getElementById("xpText").innerText = (xp%50)+" / 50"

}

</script>

</body>
</html>
