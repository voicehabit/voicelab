<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice & Plank Trainer</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Voice & Plank Trainer</h1>
    </header>
    <main>
        <div id="initial-voice-check" class="module">
            <h2>Step 1: Initial Voice Check</h2>
            <p>Let's check your voice first. Please say the following phrase:</p>
            <voice-check-module phrase="Hello, this is a test."></voice-check-module>
        </div>

        <div id="plank-exercise" class="module" style="display: none;">
            <h2>Step 2: Plank Challenge!</h2>
            <p>Hold a plank for 30 seconds. Get ready!</p>
            <plank-exercise-module duration="30"></plank-exercise-module>
        </div>

        <div id="final-voice-check" class="module" style="display: none;">
            <h2>Step 3: Final Voice Check</h2>
            <p>Great job! Now, let's check your voice again. Please say the same phrase:</p>
            <voice-check-module phrase="Hello, this is a test."></voice-check-module>
        </div>
    </main>
    <script src="main.js"></script>
</body>
</html>
