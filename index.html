<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voice Habit</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI;
background:#f2f2f2;
}

.page{
display:none;
}

.app{
max-width:420px;
margin:auto;
background:white;
min-height:100vh;
padding-bottom:80px;
}

/* 상단 영역 */

.header{
background:linear-gradient(180deg,#0e7c74,#1f3f9c);
color:white;
padding:25px;
}

.header h1{
margin:0;
font-size:26px;
}

/* 오늘의 복습 카드 */

.review-card{
background:rgba(255,255,255,0.15);
border-radius:20px;
padding:20px;
margin-top:20px;
}

.review-title{
font-size:22px;
font-weight:bold;
}

.review-desc{
margin-top:10px;
opacity:0.9;
}

.start-btn{
margin-top:20px;
background:white;
color:#4a40e0;
border:none;
padding:14px 20px;
border-radius:14px;
font-weight:bold;
font-size:16px;
box-shadow:0 5px rgba(0,0,0,0.1);
cursor:pointer;
}

/* 섹션 */

.section{
padding:20px;
}

.section h2{
margin-bottom:15px;
}

/* 카드 */

.card{
background:#f5f5f5;
border-radius:18px;
padding:20px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 3px rgba(0,0,0,0.05);
cursor:pointer;
}

.icon{
font-size:28px;
}

.button{
margin-top:20px;
background:#ff8c00;
color:white;
border:none;
padding:15px;
width:100%;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

.progress{
height:15px;
background:#ddd;
border-radius:20px;
margin-top:10px;
overflow:hidden;
}

.bar{
height:15px;
background:#ff8c00;
width:0%;
}


/* 훈련 화면 */

.training{
text-align:center;
padding:30px;
}

.timer{
font-size:50px;
margin:20px;
}

/* 컬렉션 카드 */

.collection-card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 3px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
}

/* 하단 네비 */

.navbar{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #eee;
display:flex;
justify-content:space-around;
padding:10px 0;
max-width:420px;
margin:auto;
}

.nav-item{
text-align:center;
font-size:22px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- 홈 화면 -->
<div id="homePage" class="page" style="display:block;">
    <div class="app">
        <div class="header">
            <h1>오늘의 복습</h1>
            <div class="review-card">
                <div class="review-title">발성 훈련</div>
                <div class="review-desc">매일 훈련으로 발성 점수를 높여보세요.</div>
                <button class="start-btn" onclick="showPage('trainingPage')">
                    시작 +XP
                </button>
            </div>
        </div>
        <div class="section">
            <h2>내 컬렉션</h2>
            <div class="collection-card">
                <div>
                    <div style="font-weight:bold;">연습할 틀린 문제 <span id="mistakes">0</span>개</div>
                    <div style="font-size:14px;color:gray;">
                        훈련 데이터를 기반으로 생성됩니다.
                    </div>
                </div>
                <div style="font-size:28px;">🔁</div>
            </div>
        </div>
    </div>
</div>

<!-- 발성 훈련 페이지 -->
<div id="trainingPage" class="page" style="display:none;">
    <div class="training">
        <h2>발성 훈련</h2>
        <p>"아~~~" 소리를 5초 동안 유지하세요</p>
        <div id="trainTimer" class="timer">5</div>
        <button class="button" onclick="startVoiceTraining()">녹음 시작</button>
    </div>
</div>

<!-- 퀘스트 페이지 -->
<div id="questPage" class="page" style="display:none;">
    <div class="app">
        <div class="header">
            <h1>3월의 발성 퀘스트</h1>
            <div class="review-card">
                <div style="font-size:20px;font-weight:bold;">
                    발성 점수 200점 달성하기
                </div>
                <div class="progress">
                    <div id="questBar" class="bar"></div>
                </div>
                <div id="questText" style="margin-top:5px;">
                    104 / 200
                </div>
            </div>
        </div>
        <div class="section">
            <button class="button" onclick="goHome()">홈으로 돌아가기</button>
        </div>
    </div>
</div>


<div class="navbar">
    <div class="nav-item" onclick="goHome()">🏠</div>
    <div class="nav-item" onclick="openQuest()">🎒</div>
    <div class="nav-item">🌳</div>
    <div class="nav-item">❤️</div>
    <div class="nav-item">🏋️</div>
    <div class="nav-item">⋯</div>
</div>

<script>

let xp = localStorage.getItem("xp") || 0
let questScore = localStorage.getItem("questScore") || 104

xp = parseInt(xp)
questScore = parseInt(questScore)

updateQuest()

function showPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.style.display="none"
})

document.getElementById(id).style.display="block"

}

/* 빨간 가방 클릭 */

function openQuest(){
showPage("questPage")
}

/* 홈으로 */

function goHome(){
showPage("homePage")
}

/* 훈련 시작 */

function startVoiceTraining(){

let time = 5
document.getElementById("trainTimer").innerText=time;

let timer = setInterval(()=>{

time--
document.getElementById("trainTimer").innerText=time

if(time==0){

clearInterval(timer)

let score = Math.floor(Math.random()*20)+10

xp += score
questScore += score

localStorage.setItem("xp",xp)
localStorage.setItem("questScore",questScore)

alert("훈련 완료! +" + score + " XP")

updateQuest()

goHome()

}

},1000)

}

/* 퀘스트 진행 업데이트 */

function updateQuest(){

let percent = (questScore/200)*100

document.getElementById("questBar").style.width = percent + "%"

document.getElementById("questText").innerText =
questScore + " / 200"

}

</script>

</body>
</html>
