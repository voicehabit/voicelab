<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voice Habit</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI;
background:#f2f2f2;
}

.page{
display:none;
}

.page.active{
display:block;
}

.app{
max-width:420px;
margin:auto;
background:white;
min-height:100vh;
padding-bottom:80px;
}

/* 상단 영역 */

.header{
background:linear-gradient(180deg,#0e7c74,#1f3f9c);
color:white;
padding:25px;
}

.header h1{
margin:0;
font-size:26px;
}

/* 오늘의 복습 카드 */

.review-card{
background:rgba(255,255,255,0.15);
border-radius:20px;
padding:20px;
margin-top:20px;
}

.review-title{
font-size:22px;
font-weight:bold;
}

.review-desc{
margin-top:10px;
opacity:0.9;
}

.start-btn{
margin-top:20px;
background:white;
color:#4a40e0;
border:none;
padding:14px 20px;
border-radius:14px;
font-weight:bold;
font-size:16px;
box-shadow:0 5px rgba(0,0,0,0.1);
cursor:pointer;
}

/* 섹션 */

.section{
padding:20px;
}

.section h2{
margin-bottom:15px;
}

/* 카드 */

.card{
background:#f5f5f5;
border-radius:18px;
padding:20px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 3px rgba(0,0,0,0.05);
cursor:pointer;
}

.icon{
font-size:28px;
}

/* 훈련 화면 */

.training{
text-align:center;
padding:30px;
}

.timer{
font-size:50px;
margin:20px;
}

/* 컬렉션 카드 */

.collection-card{
background:white;
border-radius:20px;
padding:20px;
box-shadow:0 3px rgba(0,0,0,0.08);
display:flex;
justify-content:space-between;
align-items:center;
}

/* 하단 네비 */

.navbar{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #eee;
display:flex;
justify-content:space-around;
padding:10px 0;
max-width:420px;
margin:auto;
}

.nav-item{
text-align:center;
font-size:22px;
}

</style>
</head>

<body>

<!-- 홈 화면 -->

<div id="home" class="page active">

<div class="app">

<div class="header">

<h1>오늘의 복습</h1>

<div class="review-card">

<div class="review-title">
듣기 집중 복습
</div>

<div class="review-desc">
집중 듣기 연습으로 귀를 훈련하세요.
</div>

<button class="start-btn" onclick="startListening()">
시작 +20 XP
</button>

</div>

</div>


<div class="section">

<h2>회화</h2>

<div class="card" onclick="goSpeaking()">
<div>말하기</div>
<div class="icon">🎤</div>
</div>

<div class="card" onclick="startListening()">
<div>듣기</div>
<div class="icon">🔊</div>
</div>

</div>


<div class="section">

<h2>내 컬렉션</h2>

<div class="collection-card">

<div>
<div style="font-weight:bold;">연습할 틀린 문제 <span id="mistakes">0</span>개</div>
<div style="font-size:14px;color:gray;">
훈련 데이터를 기반으로 생성됩니다.
</div>
</div>

<div style="font-size:28px;">🔁</div>

</div>

</div>

</div>

</div>


<!-- 말하기 훈련 페이지 -->

<div id="speaking" class="page">

<div class="training">

<h2>말하기 훈련</h2>

<p>"아~~~" 소리를 유지하세요</p>

<div id="timerSpeak" class="timer">5</div>

<button onclick="startSpeaking()">훈련 시작</button>

</div>

</div>


<!-- 듣기 훈련 페이지 -->

<div id="listening" class="page">

<div class="training">

<h2>듣기 훈련</h2>

<p>소리를 집중해서 들어보세요</p>

<div id="timerListen" class="timer">5</div>

<button onclick="runListening()">훈련 시작</button>

</div>

</div>


<div class="navbar">

<div class="nav-item" onclick="showPage('home')">🏠</div>
<div class="nav-item">🎒</div>
<div class="nav-item">🌳</div>
<div class="nav-item">❤️</div>
<div class="nav-item">🏋️</div>
<div class="nav-item">⋯</div>

</div>


<script>

let xp = localStorage.getItem("xp") || 0
let mistakes = localStorage.getItem("mistakes") || 0

document.getElementById("mistakes").innerText = mistakes


function showPage(id){

document.querySelectorAll(".page").forEach(p=>{
p.classList.remove("active")
})

document.getElementById(id).classList.add("active")

}

function goSpeaking(){
showPage("speaking")
}

function startListening(){
showPage("listening")
}

function startSpeaking(){

let time = 5

let timer = setInterval(()=>{

time--
document.getElementById("timerSpeak").innerText = time

if(time==0){

clearInterval(timer)

gainXP(10)

alert("말하기 훈련 완료! +10 XP")

showPage("home")

}

},1000)

}


function runListening(){

let time = 5

let timer = setInterval(()=>{

time--
document.getElementById("timerListen").innerText = time

if(time==0){

clearInterval(timer)

gainXP(10)

alert("듣기 훈련 완료! +10 XP")

showPage("home")

}

},1000)

}

function gainXP(amount){

xp = parseInt(xp) + amount

localStorage.setItem("xp",xp)

}

</script>

</body>
</html>
