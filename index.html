<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;

}

.app{
max-width:420px;

display:flex;

.exercise-header{

align-items:center;

.progress-bar-container{

background:#eee;

width:0%;

}

.exercise-title{

font-weight:bold;

}

.main-content{
flex-grow:1;

}

.prompt-area{

align-items:center;
justify-content:center;

}

.mascot{
width:150px;
}

.answer-area{
border-bottom:2px solid #eee;
min-height:50px;
display:flex;
flex-wrap:wrap;
gap:10px;
padding-bottom:10px;
margin-bottom:30px;
}

.word-bank{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.word-btn{

border:2px solid #eee;
border-radius:12px;
padding:10px 20px;
font-size:18px;

}

.footer{
position:fixed;
bottom:60px;
left:0;
right:0;
max-width:420px;
margin:0 auto;
background:white;
padding:20px;
}

.control-btn{
width:100%;
background:#4CAF50;
color:white;
border:none;
border-radius:12px;
padding:15px;
font-size:20px;
font-weight:bold;
cursor:pointer;
}

.navbar{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
display:flex;
justify-content:space-around;
max-width:420px;
margin:0 auto;
border-top:1px solid #eee;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:22px;
padding:10px;
color:#ccc;
}

.nav-item.active{
color:#1f3f9c;
}

.nav-text{
font-size:12px;
}
</style>
</head>

<body>

<div class="app">

<div class="exercise-header">
<span>0분</span>
<div class="progress-bar-container">
<div class="progress-bar" id="plank-progress-bar"></div>
</div>
<span>1분</span>
</div>

<div class="main-content">

<div class="prompt-area">
<img src="/img/mascot.png" class="mascot">
</div>

<div class="answer-area" id="answer-area"></div>

<div class="word-bank" id="word-bank"></div>

</div>
</div>

<div class="footer">
<button class="control-btn" id="control-btn">시작</button>
</div>

<div class="navbar">
<div class="nav-item">🏠<div class="nav-text">홈</div></div>

/* =======================
듀오링고 스타일 메시지
======================= */

const messages=[
"🔥 한 번 더 도전해볼까요?",
"💪 아직 힘이 남아 있어요",
"🚀 계속 성장 중입니다",
"⭐ 오늘 흐름이 좋아요",

"🔥 오늘 기록을 넘을까요?",
"💡 집중력이 올라가고 있어요",
"🏆 훌륭한 연습입니다",
"🚴 계속 움직여 봅시다",
"🌟 잘하고 있어요",
"💪 조금만 더 해볼까요?",
"🚀 다음 라운드 준비",
"🎤 목소리가 좋아지고 있어요",
"🔥 멈추기엔 아쉬워요",
"🏁 다시 시작해요",
"⭐ 훌륭한 집중입니다",
"💥 포기하지 마세요",
"🌱 또 한 번 도전!"
]

/* ======================= */

let currentSentence=0
let words=[]
let totalWords=0

const wordBank=document.getElementById('word-bank')
const answerArea=document.getElementById('answer-area')
const progressBar=document.getElementById('plank-progress-bar')
const controlBtn=document.getElementById('control-btn')

let progressInterval=null
let width=0
let isRunning=false

const duration=60000
const intervalTime=100

function shuffle(array){
return array.sort(()=>Math.random()-0.5)
}

function loadSentence(){

answerArea.innerHTML=""
wordBank.innerHTML=""

const sentence=sentences[currentSentence]
words=sentence.split(" ")
totalWords=words.length

shuffle([...words]).forEach((word,i)=>{

const btn=document.createElement("button")
btn.className="word-btn"
btn.textContent=word

wordBank.appendChild(btn)

})

}

function selectWord(wordBtn){

if(wordBtn.classList.contains("selected"))return

wordBtn.classList.add("selected")

const answerBtn=document.createElement("button")
answerBtn.className="word-btn"
answerBtn.textContent=wordBtn.textContent

answerArea.appendChild(answerBtn)

checkComplete()

}

function checkComplete(){

const answerWords=answerArea.querySelectorAll(".word-btn")

if(answerWords.length===totalWords){

setTimeout(()=>{

nextSentence()

},500)

}

}

function nextSentence(){

currentSentence++

if(currentSentence>=sentences.length){

shuffle(sentences)
currentSentence=0

}

loadSentence()

}

/* 타이머 */

function startTimer(){

isRunning=true
controlBtn.textContent="일시정지"

progressInterval=setInterval(()=>{

width+=(intervalTime/duration)*100

if(width>=100){

width=100
progressBar.style.width="100%"
finishSession()

}else{

progressBar.style.width=width+"%"

}

},intervalTime)

}

function finishSession(){

clearInterval(progressInterval)

controlBtn.textContent=
messages[Math.floor(Math.random()*messages.length)]

isRunning=false

}

function pauseTimer(){

clearInterval(progressInterval)
controlBtn.textContent="시작"
isRunning=false

}

/* 음성 인식 */

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition

if(SpeechRecognition){

const recognition=new SpeechRecognition()

recognition.lang="ko-KR"
recognition.continuous=true

controlBtn.addEventListener("click",()=>{

if(!isRunning){

width=0
progressBar.style.width="0%"
startTimer()
recognition.start()

}else{

pauseTimer()
recognition.stop()

}

})

recognition.onresult=(event)=>{

const transcript=
event.results[event.results.length-1][0].transcript

const recognizedWords=transcript.split(" ")

recognizedWords.forEach(word=>{

const clean=word.trim()

const wordBtn=[...wordBank.querySelectorAll(".word-btn:not(.selected)")]
.find(btn=>btn.textContent===clean)

if(wordBtn){
selectWord(wordBtn)
}

})

}

}

loadSentence()
