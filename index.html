
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">

<title>Voice Habit</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI;
background: white;
}

.page{
display:none;
}

.page.active{
display:block;
}

.app{
max-width:420px;
margin:auto;
background:white;
min-height:100vh;
padding-bottom:80px;
}

/* header */

.header{
background:linear-gradient(180deg,#0e7c74,#1f3f9c);
color:white;
padding:25px;
}

.header h1{
margin:0;
font-size:26px;
}

/* review card */

.review-card{
background:rgba(255,255,255,0.15);
border-radius:20px;
padding:20px;
margin-top:20px;
}

.start-btn{
margin-top:20px;
background:white;
color:#4a40e0;
border:none;
padding:14px 20px;
border-radius:14px;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

/* section */

.section{
padding:20px;
text-align: center;
}

.card{
background:#f5f5f5;
border-radius:18px;
padding:20px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

/* Training Page */

.training-page-layout {
    display: flex;
    flex-direction: column;
    height: calc(100vh - 80px); /* Adjust for navbar height */
}

.training-header {
    display: flex;
    align-items: center;
    padding: 10px 20px;
    border-bottom: 2px solid #eee;
}

.training-header .close-btn {
    font-size: 24px;
    color: #ccc;
    cursor: pointer;
    margin-right: 15px;
}

.training-progress {
    flex-grow: 1;
    height: 16px;
    background: #eee;
    border-radius: 8px;
    overflow: hidden;
}

.training-progress-bar {
    width: 0%;
    height: 100%;
    background: #ffc800;
    border-radius: 8px;
    transition: width 0.3s ease;
}

.training-content {
    flex-grow: 1;
    display: flex;
    flex-direction: column;
    padding: 20px;
    justify-content: space-between;
}

.prompt-area {
    position: relative;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 20px;
}

.mascot {
    width: 120px;
    height: 120px;
}

.speech-bubble {
    position: absolute;
    left: 0;
    top: 0;
    background: #f5f5f5;
    padding: 10px 15px;
    border-radius: 15px;
    font-size: 1em;
    color: #333;
    max-width: 150px;
}

.speech-bubble::after {
    content: '';
    position: absolute;
    bottom: 5px;
    left: -10px;
    border-width: 10px;
    border-style: solid;
    border-color: transparent #f5f5f5 transparent transparent;
}


#stopwatch {
    font-size: 2.5em;
    font-weight: bold;
    text-align: center;
}

.answer-area {
    border-bottom: 2px solid #eee;
    min-height: 50px;
    margin-bottom: 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    padding-bottom: 10px;
}

.word-options {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-bottom: 20px;
}

.word-btn {
    background: white;
    border: 2px solid #eee;
    border-radius: 12px;
    padding: 10px 20px;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 2px 0 #ddd;
    transition: all 0.2s;
}

.word-btn.completed {
    background: #eee;
    color: #aaa;
    box-shadow: none;
    transform: translateY(2px);
}

.training-footer {
    padding: 0 20px 20px;
}

.training-btn {
    width: 100%;
    background: #58CC02;
    color: white;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 20px;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 0 #4aa002;
}

.training-btn:disabled {
    background: #ccc;
    box-shadow: 0 4px 0 #bbb;
}


/* quest */

.quest-header{
background:#f57c00;
color:white;
padding:25px;
}

.progress{
background:#ddd;
height:16px;
border-radius:20px;
overflow:hidden;
}

.bar{
background:#ff9800;
height:16px;
width:10%;
}


/* navbar */

.navbar{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #eee;
display:flex;
justify-content:space-around;
padding:10px 0;
max-width:420px;
margin:auto;
}

.nav-item{
font-size:22px;
cursor:pointer;
}

/* Form Styles */
.form-group {
  margin-bottom: 15px;
}

.form-group label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
}

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

.form-group textarea {
  resize: vertical;
  min-height: 100px;
}

.submit-btn {
  background: #0e7c74;
  color: white;
  border: none;
  padding: 14px 20px;
  border-radius: 14px;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  width: 100%;
}

</style>
</head>

<body>

<!-- HOME -->

<div id="home" class="page active">

<div class="app">

<div class="header">

<h1>오늘의 복습</h1>

<div class="review-card">

<div style="font-size:22px;font-weight:bold;">
귀와 발성 연결 훈련
</div>

<div style="margin-top:10px;">
소리를 듣고 몸과 발성을 동시에 훈련합니다
</div>

<button class="start-btn" onclick="openQuest()">
시작 +20 XP
</button>

</div>

</div>


<div class="section">

<h2>훈련</h2>

<div class="card" onclick="startBodyTraining()">
<div>몸훈련</div>
<div>🏋️</div>
</div>

<div class="card" onclick="startBreathTraining()">
<div>호흡훈련</div>
<div>🌬</div>
</div>

</div>

<div class="section">
  <h2>제휴 문의</h2>
  <form action="https://formspree.io/f/xaqpoqqg" method="POST">
    <div class="form-group">
      <label for="email">이메일</label>
      <input type="email" id="email" name="email" required>
    </div>
    <div class="form-group">
      <label for="message">문의 내용</label>
      <textarea id="message" name="message" rows="4" required></textarea>
    </div>
    <button type="submit" class="submit-btn">보내기</button>
  </form>
</div>

</div>

</div>

<!-- BODY TRAINING -->
<div id="body" class="page training-page-layout">
    <div class="training-header">
        <div class="close-btn" onclick="showPage('home')">✕</div>
        <div class="training-progress">
            <div id="training-progress-bar" class="training-progress-bar"></div>
        </div>
    </div>
    <div class="training-content">
        <div>
            <div class="prompt-area">
                <div class="speech-bubble">목스쿼트를 시작해 볼까?</div>
                <img src="/img/mascot.png" alt="Mascot" class="mascot"/>
            </div>
            <div id="stopwatch">00:00</div>
            <div class="answer-area" id="answer-area"></div>
            <div class="word-options" id="word-options"></div>
        </div>
        <div class="training-footer">
            <button id="training-btn" class="training-btn" onclick="toggleTraining()">시작</button>
        </div>
    </div>
</div>



<!-- BREATH -->

<div id="breath" class="page">

<div class="section">

<h2>호흡훈련</h2>

<div id="breathStep">

1. 허밍

</div>

<button onclick="nextBreath()">다음</button>

</div>

</div>

<!-- QUEST -->

<div id="quest" class="page">

<div class="quest-header">

<h1>3월 발성 퀘스트</h1>

<div class="progress">
<div class="bar" id="questBar"></div>
</div>

<div id="questScore">0 / 50</div>

</div>

<div class="section">

<div class="card" onclick="startRecording()">
음성 녹음하기
</div>

<div class="card" onclick="playRecording()">
음성 저장고
</div>

</div>

<div class="section">
    <h2>댓글</h2>
    <div id="disqus_thread"></div>
    <script>
        var disqus_config = function () {
            this.page.url = window.location.href;
            this.page.identifier = \'quest-page\';
        };
        (function() { // DON\'T EDIT BELOW THIS LINE
        var d = document, s = d.createElement(\'script\');
        s.src = \'https://voicehabit.disqus.com/embed.js\';
        s.setAttribute(\'data-timestamp\', +new Date());
        (d.head || d.body).appendChild(s);
        })();
    </script>
    <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
</div>

</div>

<!-- NAV -->

<div class="navbar">

<div class="nav-item" onclick="showPage(\'home\')">🏠</div>
<div class="nav-item" onclick="openQuest()">🎒</div>
<div class="nav-item" onclick="startBodyTraining()">🏋️</div>
<div class="nav-item" onclick="startBreathTraining()">🌬</div>
<div class="nav-item">⋯</div>

</div>


<script>

let xp = localStorage.getItem("xp") || 0;
let level = localStorage.getItem("level") || 1;
let currentSentence = "";
let wordsToRecognize = [];
let recognizedWords = [];
let recognition;
let isTrainingRunning = false;
let timerInterval;
let seconds = 0;

const sentences = [
    "나는 매일 더 나은 목소리를 만든다",
    "나의 발성은 명확하고 힘이 있다",
    "자신감 있는 목소리가 나를 빛나게 한다"
];

function showPage(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function openQuest(){
    showPage("quest");
}

function startBodyTraining() {
    showPage("body");
    resetTrainingState();
    loadSentence();
}

function loadSentence() {
    currentSentence = sentences[Math.floor(Math.random() * sentences.length)];
    wordsToRecognize = currentSentence.split(' ');
    recognizedWords = [];

    const wordOptions = document.getElementById('word-options');
    wordOptions.innerHTML = '';
    wordsToRecognize.forEach(word => {
        const btn = document.createElement('button');
        btn.className = 'word-btn';
        btn.textContent = word;
        wordOptions.appendChild(btn);
    });
    
    updateAnswerArea();
    updateProgressBar();
}

function updateAnswerArea() {
    const answerArea = document.getElementById('answer-area');
    answerArea.innerHTML = '';
    recognizedWords.forEach(word => {
        const wordSpan = document.createElement('span');
        wordSpan.className = 'word-btn';
        wordSpan.textContent = word;
        answerArea.appendChild(wordSpan);
    });
}

function updateProgressBar() {
    const progress = (recognizedWords.length / wordsToRecognize.length) * 100;
    document.getElementById('training-progress-bar').style.width = `${progress}%`;
}

function formatTime(sec) {
    const minutes = Math.floor(sec / 60).toString().padStart(2, '0');
    const seconds = (sec % 60).toString().padStart(2, '0');
    return `${minutes}:${seconds}`;
}

function resetTrainingState() {
    clearInterval(timerInterval);
    seconds = 0;
    document.getElementById('stopwatch').textContent = '00:00';
    document.getElementById('training-btn').textContent = '시작';
    isTrainingRunning = false;
    if (recognition) {
        recognition.stop();
    }
}

function toggleTraining() {
    isTrainingRunning = !isTrainingRunning;
    if (isTrainingRunning) {
        startTraining();
    } else {
        stopTraining();
    }
}

async function startTraining() {
    try {
        await navigator.mediaDevices.getUserMedia({ audio: true });
        document.getElementById('training-btn').textContent = '정지';
        timerInterval = setInterval(() => {
            seconds++;
            document.getElementById('stopwatch').textContent = formatTime(seconds);
        }, 1000);
        startSpeechRecognition();
    } catch (err) {
        console.error("Microphone permission denied:", err);
        alert("마이크 사용 권한이 필요합니다.");
        isTrainingRunning = false;
    }
}

function stopTraining() {
    document.getElementById('training-btn').textContent = '시작';
    clearInterval(timerInterval);
    if (recognition) {
        recognition.stop();
    }
    const earnedXp = recognizedWords.length * 5;
     if (earnedXp > 0) {
        xp = parseInt(xp) + earnedXp;
        localStorage.setItem("xp", xp);
        alert(`훈련 완료! +${earnedXp}XP`);
        updateQuest();
    }
}

function startSpeechRecognition() {
    window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!window.SpeechRecognition) {
        alert("음성 인식을 지원하지 않는 브라우저입니다.");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'ko-KR';

    recognition.onresult = (event) => {
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                const transcript = event.results[i][0].transcript.trim();
                handleRecognition(transcript);
            }
        }
    };
    
    recognition.onend = () => {
        if (isTrainingRunning) {
            recognition.start();
        }
    };

    recognition.start();
}

function handleRecognition(transcript) {
    const nextWordToRecognize = wordsToRecognize[recognizedWords.length];
    if (transcript.includes(nextWordToRecognize)) {
        recognizedWords.push(nextWordToRecognize);
        updateAnswerArea();
        updateProgressBar();

        const wordOptions = document.getElementById('word-options');
        for(const btn of wordOptions.children) {
            if(btn.textContent === nextWordToRecognize) {
                btn.classList.add('completed');
                break;
            }
        }

        if (recognizedWords.length === wordsToRecognize.length) {
            stopTraining();
            setTimeout(() => {
                alert("문장 완성!");
                resetTrainingState();
                loadSentence();
            }, 1000);
        }
    }
}


/* BREATH */

let breathStep=0;
let breathList=["1. 허밍", "2. 스~~~~", "3. 하품 호흡", "4. 한숨 호흡"];

function startBreathTraining(){
    showPage("breath");
    breathStep=0;
    document.getElementById("breathStep").innerText=breathList[0];
}

function nextBreath(){
    breathStep++;
    if(breathStep>=breathList.length){
        xp = parseInt(xp) + 10;
        localStorage.setItem("xp",xp);
        alert("호흡훈련 완료 +10XP");
        showPage("quest");
        return;
    }
    document.getElementById("breathStep").innerText=breathList[breathStep];
}

/* RECORD */

let recorder;
let audioBlob;

async function startRecording(){
    try {
        let stream = await navigator.mediaDevices.getUserMedia({audio:true});
        recorder = new MediaRecorder(stream);
        recorder.start();
        recorder.ondataavailable = e => { audioBlob=e.data; };
        
        setTimeout(() => {
            recorder.stop();
            alert("녹음 완료");
        }, 3000);
    } catch (err) {
        alert("마이크 사용 권한이 필요합니다.");
    }
}

function playRecording(){
    if(!audioBlob) return alert("녹음된 파일이 없습니다.");
    let audio = new Audio(URL.createObjectURL(audioBlob));
    audio.play();
}

/* QUEST */

function updateQuest(){
    let percent = (parseInt(xp) / 50) * 100;
    document.getElementById("questBar").style.width = percent + "%";
    document.getElementById("questScore").innerText = `${parseInt(xp)} / 50`;
}

setInterval(updateQuest, 500);

</script>

</body>
</html>
