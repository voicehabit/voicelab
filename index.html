<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Quest</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI;
background:#f2f2f2;
}

.app{
max-width:420px;
margin:auto;
background:white;
min-height:100vh;
padding-bottom:80px;
}

/* 상단 헤더 */

.header{
background:#f57c00;
color:white;
padding:25px;
position:relative;
}

.header h1{
margin:0;
font-size:28px;
}

.header small{
opacity:0.8;
}

/* 퀘스트 카드 */

.quest-card{
background:white;
margin-top:20px;
border-radius:20px;
padding:20px;
color:#333;
}

.progress{
background:#ddd;
height:16px;
border-radius:20px;
overflow:hidden;
margin-top:10px;
}

.bar{
background:#ff9800;
height:16px;
width:52%;
}

/* 액션 버튼 */

.actions{
display:flex;
gap:15px;
padding:20px;
}

.action{
flex:1;
background:#f5f5f5;
border-radius:15px;
padding:15px;
text-align:center;
font-weight:bold;
box-shadow:0 2px rgba(0,0,0,0.1);
}

/* 오늘 훈련 */

.section{
padding:20px;
}

.mission{
margin-bottom:25px;
}

.mission-title{
font-size:20px;
margin-bottom:10px;
}

.progress-small{
background:#ddd;
height:14px;
border-radius:20px;
overflow:hidden;
}

.bar-small{
background:#ff9800;
height:14px;
width:40%;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
}

/* 하단 네비 */

.navbar{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #eee;
display:flex;
justify-content:space-around;
padding:10px 0;
max-width:420px;
margin:auto;
}

.nav-item{
font-size:22px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">

<h1>3월의 발성 퀘스트</h1>
<small>20일 진행중</small>

<div class="quest-card">

<div style="font-size:20px;font-weight:bold;">
발성 점수 200점 달성하기
</div>

<div class="progress">
<div class="bar"></div>
</div>

<div style="margin-top:5px;">
104 / 200
</div>

</div>

</div>


<div class="actions">

<div class="action">
👏 응원하기
</div>

<div class="action">
🎁 친구에게 공유
</div>

</div>


<div class="section">

<h2>오늘의 발성 훈련</h2>

<div class="mission">

<div class="row">
<div class="mission-title">
50 XP 획득하기
</div>
<div>⏱ 23시간</div>
</div>

<div class="progress-small">
<div class="bar-small" style="width:48%"></div>
</div>

<div>24 / 50</div>

</div>


<div class="mission">

<div class="mission-title">
발성 정확도 80% 이상
</div>

<div class="progress-small">
<div class="bar-small" style="width:25%"></div>
</div>

<div>1 / 4 세트</div>

</div>


<div class="mission">

<div class="mission-title">
복식호흡 2세트 완료
</div>

<div class="progress-small">
<div class="bar-small" style="width:50%"></div>
</div>

<div>1 / 2</div>

</div>

</div>

</div>


<div class="navbar">

<div class="nav-item">🏠</div>
<div class="nav-item">🎯</div>
<div class="nav-item">🎤</div>
<div class="nav-item">💪</div>
<div class="nav-item">⋯</div>

</div>

</body>
</html>
