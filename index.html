<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>스마트 보이스 트레이닝</title>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f7f7f7; color: #4c4c4c; overflow: hidden; }
        .app { max-width: 420px; margin: 0 auto; display: flex; flex-direction: column; height: 100vh; padding: 0 15px 160px; box-sizing: border-box; background: white; position: relative; }
        
        /* Header */
        .exercise-header { padding: 15px 0; display: flex; align-items: center; gap: 10px; }
        .close-btn { font-size: 24px; color: #ccc; cursor: pointer; }
        .progress-bar-container { flex-grow: 1; height: 12px; background: #eee; border-radius: 6px; overflow: hidden; }
        .progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #4CAF50, #8BC34A); transition: width 0.3s; }

        .exercise-title { font-size: 22px; font-weight: bold; margin: 10px 0; }

        /* Main Content */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; }
        .prompt-area { display: flex; align-items: center; justify-content: center; margin-bottom: 30px; position: relative; padding-top: 40px; }
        .mascot { width: 120px; transition: transform 0.3s; }
        .mascot.speaking { transform: scale(1.1); }

        .speech-bubble-top { position: absolute; top: 0; background: #1f3f9c; color: white; padding: 8px 15px; border-radius: 12px; font-weight: bold; font-size: 14px; }
        .speech-bubble-top::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); border-top: 8px solid #1f3f9c; border-left: 8px solid transparent; border-right: 8px solid transparent; }

        /* Answer & Word Bank */
        .answer-area { border-bottom: 2px solid #eee; min-height: 120px; display: flex; flex-wrap: wrap; align-content: flex-start; gap: 8px; padding: 10px; margin-bottom: 20px; background: #fafafa; border-radius: 12px; }
        .word-bank { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; min-height: 150px; }

        /* Button Styles */
        .word-btn { 
            background: white; border: 2px solid #eee; border-radius: 12px; padding: 12px 18px; 
            font-size: 16px; cursor: pointer; box-shadow: 0 3px 0 #ddd; transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            color: #4c4c4c; font-weight: bold; position: relative;
        }
        .word-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #ddd; }
        .word-btn.selected { opacity: 0.3; pointer-events: none; transform: scale(0.9); }
        
        /* Animation Target */
        .flying-word { position: fixed; z-index: 100; pointer-events: none; transition: all 0.4s ease-in-out; }

        /* Footer */
        .footer { position: fixed; bottom: 60px; left: 0; right: 0; max-width: 420px; margin: 0 auto; padding: 15px; background: white; }
        .control-btn { width: 100%; background: #1f3f9c; color: white; border: none; border-radius: 15px; padding: 18px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #152b6d; }
        .control-btn:disabled { background: #ccc; box-shadow: 0 4px 0 #aaa; }

        .navbar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; max-width: 420px; margin: 0 auto; height: 60px; border-top: 1px solid #eee; }
        .nav-item { display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ccc; width: 33%; text-decoration: none; }
        .nav-item.active { color: #1f3f9c; }
    </style>
</head>
<body>
    <div class="app">
        <div class="exercise-header">
            <span class="close-btn">✕</span>
            <div class="progress-bar-container"><div class="progress-bar" id="progress"></div></div>
        </div>

        <h1 class="exercise-title">들은 내용을 탭하세요</h1>

        <div class="main-content">
            <div class="prompt-area">
                <div class="speech-bubble-top" id="status-text">준비되셨나요?</div>
                <img src="https://cdn-icons-png.flaticon.com/512/8022/8022515.png" alt="Mascot" class="mascot" id="mascot">
            </div>

            <div class="answer-area" id="answer-area"></div>
            <div class="word-bank" id="word-bank"></div>
        </div>

        <div class="footer">
            <button class="control-btn" id="mic-btn">음성으로 시작하기</button>
        </div>

        <div class="navbar">
            <div class="nav-item">🏠</div>
            <div class="nav-item active">🏋️</div>
            <div class="nav-item">📈</div>
        </div>
    </div>

    <script>
        const sentences = [
            "나는 매일 더 나은 목소리를 만든다",
            "자신감 있는 말투가 기회를 부른다",
            "오늘도 즐겁게 스피치 연습을 한다",
            "천천히 또박또박 말하는 습관을 기르자"
        ];
        
        let currentIdx = 0;
        let targetWords = [];
        let completedWords = 0;

        const wordBank = document.getElementById('word-bank');
        const answerArea = document.getElementById('answer-area');
        const micBtn = document.getElementById('mic-btn');
        const statusText = document.getElementById('status-text');
        const mascot = document.getElementById('mascot');
        const progressBar = document.getElementById('progress');

        function initLevel() {
            answerArea.innerHTML = '';
            wordBank.innerHTML = '';
            completedWords = 0;
            const sentence = sentences[currentIdx];
            targetWords = sentence.split(' ');
            
            // 프로그레스 바 업데이트
            progressBar.style.width = `${(currentIdx / sentences.length) * 100}%`;
            statusText.textContent = `문장 ${currentIdx + 1}/${sentences.length} 도전!`;

            // 단어 섞기
            const shuffled = [...targetWords].sort(() => Math.random() - 0.5);
            shuffled.forEach((word, i) => {
                const btn = document.createElement('button');
                btn.className = 'word-btn';
                btn.textContent = word;
                btn.dataset.index = i;
                btn.onclick = () => handleWordSelection(word, btn);
                wordBank.appendChild(btn);
            });
        }

        function handleWordSelection(word, btn) {
            // 정답 순서 체크 (순서대로 채우기)
            if (word === targetWords[completedWords]) {
                animateWord(btn);
            } else {
                // 틀렸을 때 흔들리는 효과
                btn.style.animation = 'shake 0.3s';
                setTimeout(() => btn.style.animation = '', 300);
            }
        }

        function animateWord(originalBtn) {
            const rect = originalBtn.getBoundingClientRect();
            
            // 복제본 생성 (날아가는 효과용)
            const flyer = originalBtn.cloneNode(true);
            flyer.classList.add('flying-word');
            flyer.style.left = rect.left + 'px';
            flyer.style.top = rect.top + 'px';
            flyer.style.width = rect.width + 'px';
            document.body.appendChild(flyer);

            // 원본 숨기기
            originalBtn.classList.add('selected');

            // 목적지 계산용 임시 요소
            const targetPlaceholder = document.createElement('div');
            targetPlaceholder.className = 'word-btn';
            targetPlaceholder.style.visibility = 'hidden';
            targetPlaceholder.textContent = originalBtn.textContent;
            answerArea.appendChild(targetPlaceholder);
            
            const targetRect = targetPlaceholder.getBoundingClientRect();

            // 애니메이션 실행
            requestAnimationFrame(() => {
                flyer.style.left = targetRect.left + 'px';
                flyer.style.top = targetRect.top + 'px';
            });

            setTimeout(() => {
                document.body.removeChild(flyer);
                targetPlaceholder.style.visibility = 'visible';
                completedWords++;
                checkCompletion();
            }, 400);
        }

        function checkCompletion() {
            if (completedWords === targetWords.length) {
                statusText.textContent = "완벽해요! 다음으로 넘어갑니다.";
                progressBar.style.width = `${((currentIdx + 1) / sentences.length) * 100}%`;
                
                setTimeout(() => {
                    currentIdx = (currentIdx + 1) % sentences.length;
                    initLevel();
                }, 1500);
            }
        }

        // --- 음성 인식 설정 ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'ko-KR';
            recognition.continuous = true;

            micBtn.addEventListener('click', () => {
                if (micBtn.textContent.includes('시작')) {
                    recognition.start();
                    micBtn.textContent = '그만하기';
                    micBtn.style.background = '#f44336';
                } else {
                    recognition.stop();
                    micBtn.textContent = '음성으로 시작하기';
                    micBtn.style.background = '#1f3f9c';
                }
            });

            recognition.onstart = () => {
                statusText.textContent = "듣고 있어요! 문장을 읽어주세요.";
                mascot.classList.add('speaking');
            };

            recognition.onresult = (event) => {
                const transcript = event.results[event.results.length - 1][0].transcript;
                const spokenWords = transcript.replace(/[.,!?;]/g, '').split(' ');

                spokenWords.forEach(word => {
                    const availableBtns = Array.from(wordBank.querySelectorAll('.word-btn:not(.selected)'));
                    const targetBtn = availableBtns.find(btn => btn.textContent === word);
                    
                    if (targetBtn && word === targetWords[completedWords]) {
                        handleWordSelection(word, targetBtn);
                    }
                });
            };

            recognition.onend = () => {
                mascot.classList.remove('speaking');
            };
        }

        // 초기 실행
        initLevel();
    </script>

    <style>
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }
    </style>
</body>
</html>
