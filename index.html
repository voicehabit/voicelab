<style>

body{

.app{

/* header */

.header{

color:white;
padding:25px;
}

.header h1{
margin:0;

}

/* review card */

.review-card{
background:rgba(255,255,255,0.15);
border-radius:20px;
padding:20px;
margin-top:20px;
}

.start-btn{
margin-top:20px;
background:white;
color:#4a40e0;
border:none;
padding:14px 20px;
border-radius:14px;
font-weight:bold;
font-size:16px;
cursor:pointer;

/* section */

.section{
padding:20px;
}

.card{
background:#f5f5f5;
border-radius:18px;
padding:20px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.training-btn{
display: block;
width: 100%;
background:#f5f5f5;
border-radius:18px;
padding:20px;
margin-bottom:15px;
justify-content:space-between;
align-items:center;
cursor:pointer;
border: none;
font-size: 16px;
}

/* quest */

.quest-header{
background:#f57c00;
color:white;
padding:25px;
}

.progress{
background:#ddd;
height:16px;
border-radius:20px;
overflow:hidden;
}

.bar{
background:#ff9800;
height:16px;
width:10%;
}

/* pronunciation */

#timer {
    font-size: 3.2em;
    font-weight: bold;
    text-align: center;
    margin: 20px 0;
}

#record {
    font-size: 1.2em;
    color: #555;
    min-height: 2em;
    text-align: center;
    padding: 0 10px;
}

.line{
padding: 8px;
font-size:18px;
border: 2px solid transparent;
border-radius: 8px;
margin-bottom: 8px;
transition: all 0.3s;
}

.line span {
  transition: background-color 0.3s;
}

.line-active {
    border-color: #0e7c74;
}

.line-completed {
    text-decoration: line-through;
    color: #aaa;
}


.highlight {
    background-color: #b3e5fc;
}


/* navbar */

.navbar{
position:fixed;
bottom:0;
left:0;
right:0;
background:white;
border-top:1px solid #eee;
display:flex;
justify-content:space-around;
padding:10px 0;
max-width:420px;
margin:auto;
}

.nav-item{
font-size:22px;
cursor:pointer;
}

/* Form Styles */
.form-group {
  margin-bottom: 15px;
}

.form-group label {
  display: block;
  margin-bottom: 5px;
  font-weight: bold;
}

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
  box-sizing: border-box;
}

.form-group textarea {
  resize: vertical;
  min-height: 100px;
}

.submit-btn {
  background: #0e7c74;
  color: white;
  border: none;
  padding: 14px 20px;
  border-radius: 14px;
  font-weight: bold;
  font-size: 16px;
  cursor: pointer;
  width: 100%;
}

</style>
</head>

<body>

<!-- HOME -->

<div class="app">

<div class="header">

<h1>오늘의 복습</h1>

<div class="review-card">

<div style="font-size:22px;font-weight:bold;">
귀와 발성 연결 훈련
</div>

소리를 듣고 몸과 발성을 동시에 훈련합니다

<button class="start-btn" onclick="openQuest()">
시작 +20 XP

<div class="card" onclick="startBodyTraining()">

</div>

<!-- BODY TRAINING -->

<div id="body" class="page">
    <div class="section">
        <h2>스쿼트 발음훈련</h2>
        <div id="lines">
            <div class="line" data-text="나는 매일 더 나은 목소리를 만든다."></div>
            <div class="line" data-text="나의 발성은 명확하고 힘이 있다."></div>
            <div class="line" data-text="자신감 있는 목소리가 나를 빛나게 한다."></div>
            <div class="line" data-text="세상과 소통하는 나의 목소리는 소중하다."></div>
            <div class="line" data-text="나는 내 목소리의 주인이 되어 조절한다."></div>
            <div class="line" data-text="정확한 발음으로 나의 생각을 전달한다."></div>
            <div class="line" data-text="나의 목소리는 무한한 가능성을 가졌다."></div>
            <div class="line" data-text="꾸준한 훈련이 최고의 목소리를 만든다."></div>

        </div>

<div class="section">

<div id="breathStep">

1. 허밍

</div>

<button onclick="nextBreath()">다음</button>

</div>

</div>

<div id="quest" class="page">

<div class="quest-header">

<h1>3월 발성 퀘스트</h1>

<div class="progress">
<div class="bar" id="questBar"></div>
</div>

</div>

<div class="card" onclick="startRecording()">
음성 녹음하기
</div>

<script>

let xp = localStorage.getItem("xp") || 0;
let level = localStorage.getItem("level") || 1;

function showPage(id){
    document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
}

function openQuest(){
    showPage("quest");
}

/* BODY TRAINING */

let timerInterval;
let seconds = 0;
let recognition;
let currentLineIndex = 0;
let isTrainingRunning = false;
let finalTranscriptForLine = '';

function startBodyTraining() {
    showPage("body");
    resetTraining();
    document.querySelectorAll('.line').forEach(line => {
        const text = line.getAttribute('data-text');
        line.innerHTML = ''; // Clear previous spans
        text.split('').forEach(char => {
            const span = document.createElement('span');
            span.textContent = char;
            line.appendChild(span);
        });
    });
    if(document.querySelectorAll('.line').length > 0) {
        document.querySelectorAll('.line')[0].classList.add('line-active');
    }
}

function formatTime(sec) {
    const minutes = Math.floor(sec / 60).toString().padStart(2, '0');
    const seconds = (sec % 60).toString().padStart(2, '0');
    return `${minutes}:${seconds}`;
}

function resetTraining() {
    clearInterval(timerInterval);
    seconds = 0;
    document.getElementById('timer').textContent = '00:00';
    document.getElementById('record').textContent = '음성 인식 준비 완료';
    document.getElementById('pronunciation-btn').textContent = '훈련 시작';
    isTrainingRunning = false;
    currentLineIndex = 0;
    finalTranscriptForLine = '';
    
    if (recognition) {
        recognition.stop();
    }

    document.querySelectorAll('.line').forEach(line => {
        line.classList.remove('line-active', 'line-completed');
        line.querySelectorAll('span').forEach(span => {
            span.classList.remove('highlight');
        });
    });
}

async function togglePronunciation() {
    // Request microphone permission upfront
    try {
        await navigator.mediaDevices.getUserMedia({ audio: true });
    } catch (err) {
        console.error("Microphone permission denied:", err);
        alert("마이크 사용 권한이 필요합니다. 브라우저 설정에서 마이크를 허용해주세요.");
        return;
    }

    isTrainingRunning = !isTrainingRunning;
    if (isTrainingRunning) {
        // Start training
        document.getElementById('pronunciation-btn').textContent = '정지';
        timerInterval = setInterval(() => {
            seconds++;
            document.getElementById('timer').textContent = formatTime(seconds);
        }, 1000);
        startSpeechRecognition();
    } else {
        // Stop training
        document.getElementById('pronunciation-btn').textContent = '훈련 시작';
        clearInterval(timerInterval);
        const earnedXp = Math.floor(seconds / 10);
        if (earnedXp > 0) {
            xp = parseInt(xp) + earnedXp;
            localStorage.setItem("xp", xp);
            alert(`훈련 완료! +${earnedXp}XP`);
        }
        document.getElementById('record').textContent = `총 연습 시간: ${formatTime(seconds)}`;
        if (recognition) {
            recognition.stop();
        }
    }
}

function startSpeechRecognition() {
    window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!window.SpeechRecognition) {
        alert("죄송합니다, 당신의 브라우저는 음성 인식을 지원하지 않습니다.");
        return;
    }

    recognition = new SpeechRecognition();
    recognition.continuous = true;
    recognition.interimResults = true;
    recognition.lang = 'ko-KR';

    recognition.onstart = () => {
        document.getElementById('record').textContent = "음성 인식 중...";
    };

    recognition.onerror = (event) => {
        console.error('Speech recognition error:', event.error);
        let errorMessage = "음성 인식 오류가 발생했습니다.";
        if (event.error === 'no-speech') {
            errorMessage = "음성이 감지되지 않았습니다. 마이크를 확인해주세요.";
        } else if (event.error === 'not-allowed') {
            errorMessage = "마이크 사용이 차단되었습니다. 접근 권한을 확인해주세요.";
        }
        document.getElementById('record').textContent = errorMessage;
    };
    
    recognition.onend = () => {
      if (isTrainingRunning) {
        console.log("Recognition service ended. Restarting...");
        recognition.start();
      } else {
        console.log("Recognition service stopped by user.");
      }
    };

    recognition.onresult = (event) => {
        let interimTranscript = '';
        for (let i = event.resultIndex; i < event.results.length; ++i) {
            if (event.results[i].isFinal) {
                finalTranscriptForLine += event.results[i][0].transcript;
            } else {
                interimTranscript += event.results[i][0].transcript;
            }
        }
        
        document.getElementById('record').textContent = finalTranscriptForLine + interimTranscript;
        highlightText(finalTranscriptForLine + interimTranscript);
    };

    recognition.start();
}

function highlightText(transcript) {
    const lines = document.querySelectorAll('.line');
    if (currentLineIndex >= lines.length) {
        return;
    }

    const lineDiv = lines[currentLineIndex];
    const spans = lineDiv.querySelectorAll('span');
    const originalText = lineDiv.getAttribute('data-text');

    const cleanOriginal = originalText.replace(/\s/g, '');
    const cleanTranscript = transcript.replace(/\s/g, '');

    spans.forEach((span, i) => {
        if (i < cleanTranscript.length && span.textContent === cleanTranscript[i]) {
            span.classList.add('highlight');
        } else {
            span.classList.remove('highlight');
        }
    });

    if (cleanTranscript.includes(cleanOriginal)) {
        lineDiv.classList.remove('line-active');
        lineDiv.classList.add('line-completed');
        
        // Move to the next line
        currentLineIndex++;
        finalTranscriptForLine = ''; // Reset for the next line

        if (currentLineIndex < lines.length) {
            lines[currentLineIndex].classList.add('line-active');
        } else {
            // All lines completed
            alert("모든 문장 훈련 완료!");
            togglePronunciation(); // Stop the training session
        }
    }
}


/* BREATH */

let breathStep=0;
let breathList=["1. 허밍", "2. 스~~~~", "3. 하품 호흡", "4. 한숨 호흡"];

function startBreathTraining(){
    showPage("breath");
    breathStep=0;
    document.getElementById("breathStep").innerText=breathList[0];
}

function nextBreath(){
    breathStep++;
    if(breathStep>=breathList.length){
        xp = parseInt(xp) + 10;
        localStorage.setItem("xp",xp);
        alert("호흡훈련 완료 +10XP");
        showPage("quest");
        return;
    }
    document.getElementById("breathStep").innerText=breathList[breathStep];
}

/* RECORD */

let recorder;
let audioBlob;

async function startRecording(){
    try {
        let stream = await navigator.mediaDevices.getUserMedia({audio:true});
        recorder = new MediaRecorder(stream);
        recorder.start();
        recorder.ondataavailable = e => { audioBlob=e.data; };
        
        setTimeout(() => {
            recorder.stop();
            alert("녹음 완료");
        }, 3000);
    } catch (err) {
        alert("마이크 사용 권한이 필요합니다.");
    }
}

function playRecording(){
    if(!audioBlob) return alert("녹음된 파일이 없습니다.");
    let audio = new Audio(URL.createObjectURL(audioBlob));
    audio.play();
}

/* QUEST */

function updateQuest(){
    let percent = (parseInt(xp) / 50) * 100;
    document.getElementById("questBar").style.width = percent + "%";
    document.getElementById("questScore").innerText = `${parseInt(xp)} / 50`;
}

setInterval(updateQuest, 500);

</script>
