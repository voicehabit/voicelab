<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voice Habit</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f7f7f7;
margin:0;
display:flex;
justify-content:center;
}

.app{
width:380px;
max-width:100%;
background:white;
min-height:100vh;
}

.header{
background:#58cc02;
color:white;
padding:20px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.streak{
text-align:center;
padding:10px;
font-size:18px;
}

.progress{
height:10px;
background:#eee;
margin:10px 20px;
border-radius:20px;
overflow:hidden;
}

.progress-bar{
height:10px;
background:#58cc02;
width:0%;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
text-align:center;
}

.exercise-title{
font-size:20px;
margin-bottom:10px;
}

.timer{
font-size:40px;
margin:15px;
}

.button{
background:#58cc02;
color:white;
border:none;
padding:15px;
width:100%;
border-radius:15px;
font-size:18px;
cursor:pointer;
}

.button:active{
transform:scale(0.97);
}

.done{
background:#ddd;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
🎤 Voice Habit
</div>

<div class="streak">
🔥 Streak: <span id="streak">0</span> days
</div>

<div class="progress">
<div class="progress-bar" id="progressBar"></div>
</div>


<div class="card">

<div class="exercise-title">
플랭크 + 호흡
</div>

<div class="timer" id="timer">
60
</div>

<button class="button" onclick="startTimer()">
시작
</button>

</div>


<div class="card">

<div class="exercise-title">
발성 연습 "음~"
</div>

<p>
입을 다물고 코로 숨 쉬며  
30초 동안 "음" 소리
</p>

<button class="button" onclick="completeExercise()">
완료
</button>

</div>

</div>


<script>

let time=60
let timerInterval
let progress=0
let streak=localStorage.getItem("streak") || 0

document.getElementById("streak").innerText=streak

function startTimer(){

timerInterval=setInterval(()=>{

time--
document.getElementById("timer").innerText=time

if(time<=0){
clearInterval(timerInterval)
completeExercise()
}

},1000)

}


function completeExercise(){

progress+=50

document.getElementById("progressBar").style.width=progress+"%"

if(progress>=100){

streak++
localStorage.setItem("streak",streak)

alert("오늘 훈련 완료!")

location.reload()

}

}

</script>

</body>
</html>
